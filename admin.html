<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Admin - Meme Voting Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; }
        header h1 {
            font-size: 2rem;
            background: linear-gradient(to right, #e94560, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p { color: #aaa; margin-top: 6px; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 24px 0;
        }
        .nav-btn {
            background: linear-gradient(135deg, #e94560, #f5a623);
            border: none;
            color: #fff;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
        }
        .nav-btn:hover { transform: scale(1.05); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .slide-info {
            font-size: 1.3rem;
            color: #f5a623;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }
        .preview {
            background: #1e2a3a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin: 20px 0;
        }
        .preview .author {
            padding: 14px 20px;
            color: #aaa;
            border-bottom: 1px solid #2a3a4a;
        }
        .preview .author span { color: #f5a623; font-weight: 600; }
        .preview .media-container {
            width: 100%;
            display: flex;
            justify-content: center;
            background: #111;
            min-height: 250px;
            max-height: 400px;
            overflow: hidden;
        }
        .preview .media-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        .preview .media-container video {
            max-width: 100%;
            max-height: 400px;
        }
        .vote-counts {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 16px;
            font-size: 1.3rem;
        }
        .connected {
            text-align: center;
            color: #4ecdc4;
            margin: 10px 0;
            font-size: 0.95rem;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin: 16px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #e94560, #f5a623);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Meme Voting Game</h1>
        </header>

        <div class="connected" id="connected">Connecting...</div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" id="prev-btn" onclick="changeSlide(-1)">← Prev</button>
            <span class="slide-info" id="slide-info">1 / 22</span>
            <button class="nav-btn" id="next-btn" onclick="changeSlide(1)">Next →</button>
        </div>

        <div style="text-align:center; margin: 16px 0;">
            <button class="nav-btn" onclick="showTopResults()" style="background: linear-gradient(135deg, #4ecdc4, #44bd9e);">🏆 Show Top 5 to Everyone</button>
        </div>

        <div class="preview">

            <div class="media-container" id="media-container"></div>
            <div class="vote-counts" id="vote-counts"></div>
        </div>
    </div>

    <script>
        const memes = [
            { file: "Bahubali_Jhansi Sai Anusha Ka.png", author: "Jhansi Sai Anusha Ka", type: "image" },
            { file: "ChatGPT Image May 23, 2026, 08_35_02 PM_Heena ..png", author: "Heena", type: "image" },
            { file: "ChatGPT Image May 23, 2026, 08_40_13 PM_Heena ..png", author: "Heena", type: "image" },
            { file: "ChatGPT Image May 23, 2026, 09_24_15 PM_Heena ..png", author: "Heena", type: "image" },
            { file: "ChatGPT Image May 23, 2026, 11_49_45 AM_Heena ..png", author: "Heena", type: "image" },
            { file: "ChatGPT Image May 25, 2026, 01_50_04 PM_Heena ..png", author: "Heena", type: "image" },
            { file: "ChatGPT Image May 25, 2026, 08_11_01 PM_Heena ..png", author: "Heena", type: "image" },
            { file: "Meme1_Aruna_Aruna Sairam.png", author: "Aruna Sairam", type: "image" },
            { file: "Meme_Ashutosh Jha.png", author: "Ashutosh Jha", type: "image" },
            { file: "Meme_Nadar Senthilkumar.png", author: "Nadar Senthilkumar", type: "image" },
            { file: "MicrosoftTeams-video_Sanket Jagtap.mp4", author: "Sanket Jagtap", type: "video" },
            { file: "MicrosoftTeams-video (1)_Sanket Jagtap.mp4", author: "Sanket Jagtap", type: "video" },
            { file: "MicrosoftTeams-video (2)_Sanket Jagtap.mp4", author: "Sanket Jagtap", type: "video" },
            { file: "MicrosoftTeams-video (3)_Sanket Jagtap.mp4", author: "Sanket Jagtap", type: "video" },
            { file: "MicrosoftTeams-video (4)_Sanket Jagtap.mp4", author: "Sanket Jagtap", type: "video" },
            { file: "MicrosoftTeams-video (5)_Sanket Jagtap.mp4", author: "Sanket Jagtap", type: "video" },
            { file: "MicrosoftTeams-video (6)_Sanket Jagtap.mp4", author: "Sanket Jagtap", type: "video" },
            { file: "PromptMatters_Jhansi Sai Anusha Ka.png", author: "Jhansi Sai Anusha Ka", type: "image" },
            { file: "Rahul Malik_s Video - May 24, 2026 (1).mp4", author: "Rahul Malik", type: "video" },
            { file: "Screenshot 2026-05-23 at 11.51.48 AM_Sanket Jagtap.png", author: "Sanket Jagtap", type: "image" },
            { file: "Screenshot 2026-05-26 at 10.27.01 AM_Heena ..png", author: "Heena", type: "image" },
            { file: "image (9)_Abhisek Sah.png", author: "Abhisek Sah", type: "image" },
            { file: "meme1_Nivesh Soni.jpg", author: "Nivesh Soni", type: "image" },
            { file: "meme2_Nivesh Soni.jpg", author: "Nivesh Soni", type: "image" },
            { file: "meme3_Nivesh Soni.jpg", author: "Nivesh Soni", type: "image" },
            { file: "meme_1_Abhisek Sah.png", author: "Abhisek Sah", type: "image" },
            { file: "meme_2_Abhisek Sah.png", author: "Abhisek Sah", type: "image" },
            { file: "meme_3_Abhisek Sah.png", author: "Abhisek Sah", type: "image" },
            { file: "p1_Jhansi Sai Anusha Ka.png", author: "Jhansi Sai Anusha Ka", type: "image" },
            { file: "smallIssue_Jhansi Sai Anusha Ka.png", author: "Jhansi Sai Anusha Ka", type: "image" },
        ];

        let currentSlide = 0;
        let allVotes = {};

        function connectSSE() {
            const es = new EventSource('/api/stream');

            es.onmessage = function(e) {
                const data = JSON.parse(e.data);
                document.getElementById('connected').textContent = '🟢 Connected — you are the presenter';

                if (data.type === 'init') {
                    allVotes = data.votes;
                    currentSlide = data.slide;
                    render();
                }

                if (data.type === 'update') {
                    allVotes = data.votes;
                    renderVoteCounts();
                }

                if (data.type === 'slide') {
                    currentSlide = data.slide;
                    render();
                }
            };

            es.onerror = function() {
                document.getElementById('connected').textContent = '🔴 Reconnecting...';
                es.close();
                setTimeout(connectSSE, 3000);
            };
        }

        connectSSE();

        async function changeSlide(dir) {
            const newSlide = currentSlide + dir;
            if (newSlide < 0 || newSlide >= memes.length) return;
            currentSlide = newSlide;
            await fetch('/api/slide', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slide: newSlide })
            });
            render();
        }

        function render() {
            const meme = memes[currentSlide];
            document.getElementById('slide-info').textContent = `${currentSlide + 1} / ${memes.length}`;
            document.getElementById('progress').style.width = `${((currentSlide + 1) / memes.length) * 100}%`;
            document.getElementById('prev-btn').disabled = currentSlide === 0;
            document.getElementById('next-btn').disabled = currentSlide === memes.length - 1;

            const mediaContainer = document.getElementById('media-container');
            if (meme.type === 'video') {
                mediaContainer.innerHTML = `<video controls playsinline><source src="${encodeURI(meme.file)}" type="video/mp4"></video>`;
            } else {
                mediaContainer.innerHTML = `<img src="${encodeURI(meme.file)}" alt="Meme by ${meme.author}">`;
            }
            renderVoteCounts();
        }

        function renderVoteCounts() {
            const key = `meme_${currentSlide}`;
            const votes = allVotes[key] || { "🙂": [], "😂": [] };
            const smile = (votes["🙂"] || []).length;
            const lol = (votes["😂"] || []).length;
            document.getElementById('vote-counts').innerHTML = `
                <span>🙂 ${smile}</span>
                <span>😂 ${lol}</span>
                <span style="color:#aaa">Total: ${smile + lol}</span>
            `;
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        async function showTopResults() {
            await fetch('/api/show-results', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            alert('Top 5 results shown to everyone!');
        }

        render();
    </script>
</body>
</html>
